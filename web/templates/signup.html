{{define "content"}}
<div class="auth-container">
    <div class="auth-card">
        <div class="brand">
            <div class="brand-name">Locked<span class="wm-in">In</span></div>
            <div class="brand-tagline">Your quiet corner of the internet</div>
            <p class="brand-pitch">Follow what matters to you. We'll bring it here, quietly.</p>
        </div>

        <form class="auth-form" method="POST" action="/signup">
            <h2 class="form-title">Create your account</h2>

            <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="Create a password" autocomplete="new-password" required>
                <div class="form-hint">At least 10 characters, with uppercase, lowercase, a number, and a special character.</div>
            </div>

            <button class="btn btn-primary btn-block" type="submit">Sign up</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>
{{end}}
