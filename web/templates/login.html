{{define "content"}}
<div class="auth-container">
    <div class="auth-card">
        <div class="brand">
            <div class="brand-name">LockedIn<span class="wm-dot">.</span></div>
            <div class="brand-tagline">Quality picks. Zero noise.</div>
        </div>

        <form class="auth-form" method="POST" action="/login">
            <h2 class="form-title">Welcome back</h2>

            {{if eq .Message "check-email"}}
            <div class="message message-info">
                Check your email for a verification link, then come back to sign in.
            </div>
            {{end}}

            {{if eq .Message "verified"}}
            <div class="message message-success">
                Email verified. You're in — sign in below.
            </div>
            {{end}}

            <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
            </div>

            <button class="btn btn-primary btn-block" type="submit">Sign in</button>
        </form>

        <div class="auth-footer">
            New here? <a href="/signup">Create an account</a>
        </div>
    </div>
</div>
{{end}}
